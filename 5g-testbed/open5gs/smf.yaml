global:
  max:
    ue: 1024

logger:
  level: info

db_uri: mongodb://mongodb:27017/open5gs

smf:
  sbi:
    server:
      - dev: eth0
        port: 7777
    client:
      nrf:
        - uri: http://open5gs-nrf:7777
  pfcp:
    server:
      - dev: eth0
    client:
      upf:
        - address: open5gs-upf
  gtpc:
    server:
      - dev: eth0
  gtpu:
    server:
      - dev: eth0
  session:
    - subnet: 10.45.0.0/16
      dnn: internet
  dns:
    - 8.8.8.8
    - 8.8.4.4
