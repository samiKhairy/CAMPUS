version: '3.8'

services:
  # 1. The official Zenoh Router
  zenoh-router:
    image: eclipse/zenoh:latest
    container_name: zenoh-router
    ports:
      - "7447:7447" # Exposes port 7447 to your host machine
    networks:
      - campus-net

  # 2. The Edge Node
  edge-node:
    build:
      context: .
      dockerfile: docker/Dockerfile.edge
    container_name: edge-node
    environment:
      - ZENOH_ROUTER=tcp/zenoh-router:7447
      - PAYLOAD_BYTES=100
      - INTERVAL_SEC=1.0
      - TARGET_DEVICES=device-1,device-2
    volumes:
      - ./results:/app/results # Sync generated results to local host results directory
    depends_on:
      - zenoh-router
    cap_add:
      - NET_ADMIN
    networks:
      - campus-net

  # 3. Simulated Device 1
  device-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.device
    container_name: device-1
    command: ["python", "device_zenoh.py", "device-1"]
    environment:
      - ZENOH_ROUTER=tcp/zenoh-router:7447
    depends_on:
      - zenoh-router
    cap_add:
      - NET_ADMIN
    networks:
      - campus-net

  # 4. Simulated Device 2
  device-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.device
    container_name: device-2
    command: ["python", "device_zenoh.py", "device-2"]
    environment:
      - ZENOH_ROUTER=tcp/zenoh-router:7447
    depends_on:
      - zenoh-router
    cap_add:
      - NET_ADMIN
    networks:
      - campus-net

networks:
  campus-net:
    driver: bridge
